name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0"

      - name: Fetch patched Miuix Android artifacts
        run: sh scripts/fetch-miuix-android.sh

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Check pinned version matrix
        run: sh scripts/check-version-matrix.sh

      - name: Build release
        run: gradle --no-daemon --stacktrace :app:assembleRelease :app:bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: verbo-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: verbo-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
